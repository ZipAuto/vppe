<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#040408"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#ff3300" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wire" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc4400"/>
      <stop offset="30%" stop-color="#ff8800"/>
      <stop offset="60%" stop-color="#ffaa44"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </linearGradient>
    <linearGradient id="housing" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="30%" stop-color="#888"/>
      <stop offset="60%" stop-color="#ccc"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <filter id="gf"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="heatglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#ff4400" flood-opacity="0.2"/>
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="400" height="560" fill="url(#bg)"/>
  <ellipse cx="200" cy="260" rx="160" ry="160" fill="url(#glow)" filter="url(#gf)"/>

  <!-- Heat haze glow behind coil -->
  <ellipse cx="200" cy="260" rx="90" ry="70" fill="#ff4400" fill-opacity="0.06" filter="url(#gf)"/>

  <!-- RESISTANCE COIL - main element -->
  <!-- Housing cylinder / base -->
  <rect x="155" y="380" width="90" height="35" rx="8" fill="url(#housing)" filter="url(#shadow)"/>
  <rect x="160" y="385" width="14" height="25" rx="7" fill="white" fill-opacity="0.15"/>
  <!-- Center post -->
  <rect x="192" y="180" width="16" height="205" rx="5" fill="#888"/>
  <rect x="196" y="184" width="6" height="197" rx="3" fill="#bbb" fill-opacity="0.5"/>

  <!-- Coil wire spiral - multiple turns rendered as offset ellipses -->
  <g filter="url(#heatglow)">
    <!-- Coil turns from bottom to top -->
    <ellipse cx="200" cy="355" rx="58" ry="15" fill="none" stroke="url(#wire)" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="200" cy="340" rx="58" ry="15" fill="none" stroke="url(#wire)" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="200" cy="325" rx="58" ry="15" fill="none" stroke="url(#wire)" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="200" cy="310" rx="58" ry="15" fill="none" stroke="url(#wire)" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="200" cy="295" rx="58" ry="15" fill="none" stroke="url(#wire)" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="200" cy="280" rx="58" ry="15" fill="none" stroke="url(#wire)" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="200" cy="265" rx="58" ry="15" fill="none" stroke="url(#wire)" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="200" cy="250" rx="58" ry="15" fill="none" stroke="url(#wire)" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="200" cy="235" rx="58" ry="15" fill="none" stroke="url(#wire)" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="200" cy="220" rx="58" ry="15" fill="none" stroke="url(#wire)" stroke-width="7" stroke-linecap="round"/>
    <!-- Hottest turn - brightest -->
    <ellipse cx="200" cy="285" rx="58" ry="15" fill="none" stroke="#ffdd00" stroke-width="4" stroke-linecap="round" stroke-opacity="0.6"/>
    <ellipse cx="200" cy="300" rx="58" ry="15" fill="none" stroke="#ffaa00" stroke-width="3" stroke-linecap="round" stroke-opacity="0.4"/>
  </g>

  <!-- Top cap with connection -->
  <rect x="168" y="168" width="64" height="20" rx="8" fill="url(#housing)"/>
  <rect x="172" y="172" width="12" height="12" rx="4" fill="#aaa"/>
  <rect x="216" y="172" width="12" height="12" rx="4" fill="#aaa"/>
  <!-- Screw holes -->
  <circle cx="178" cy="178" r="3" fill="#666"/>
  <circle cx="222" cy="178" r="3" fill="#666"/>
  <!-- Resistance spec label -->
  <rect x="162" y="390" width="76" height="20" rx="3" fill="#111" fill-opacity="0.5"/>
  <text x="200" y="404" text-anchor="middle" font-family="monospace" font-size="10" fill="#F3FF00" fill-opacity="0.8">0.2Ω · Mesh</text>

  <!-- Heat shimmer lines -->
  <path d="M145 200 Q138 185 145 170 Q152 155 145 140" stroke="#ff6600" stroke-width="1" fill="none" stroke-opacity="0.2" stroke-linecap="round"/>
  <path d="M200 195 Q195 178 200 162 Q205 146 200 130" stroke="#ff6600" stroke-width="1.2" fill="none" stroke-opacity="0.15" stroke-linecap="round"/>
  <path d="M255 205 Q262 188 255 172 Q248 156 255 140" stroke="#ff6600" stroke-width="1" fill="none" stroke-opacity="0.2" stroke-linecap="round"/>

  <!-- Brand dots / sparks -->
  <circle cx="145" cy="300" r="3" fill="#F3FF00" fill-opacity="0.4"/>
  <circle cx="258" cy="270" r="2.5" fill="#ff8800" fill-opacity="0.6"/>
  <circle cx="310" cy="350" r="2" fill="#F3FF00" fill-opacity="0.3"/>
  <circle cx="95" cy="250" r="1.5" fill="#ff8800" fill-opacity="0.4"/>
  <!-- tiny orange hot sparks -->
  <circle cx="200" cy="160" r="2.5" fill="#F3FF00" fill-opacity="0.5"/>
  <circle cx="185" cy="148" r="1.5" fill="#ffaa00" fill-opacity="0.4"/>
  <circle cx="216" cy="152" r="1.5" fill="#ffaa00" fill-opacity="0.4"/>
</svg>
