<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="100%" stop-color="#020610"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#ff6b00" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff6b00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="can1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc0000"/>
      <stop offset="20%" stop-color="#ff3333"/>
      <stop offset="50%" stop-color="#ff6666"/>
      <stop offset="80%" stop-color="#dd1111"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>
    <linearGradient id="can2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#004d00"/>
      <stop offset="25%" stop-color="#007700"/>
      <stop offset="55%" stop-color="#00aa00"/>
      <stop offset="80%" stop-color="#005500"/>
      <stop offset="100%" stop-color="#003300"/>
    </linearGradient>
    <linearGradient id="can3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a4a"/>
      <stop offset="30%" stop-color="#2a2aaa"/>
      <stop offset="60%" stop-color="#4444cc"/>
      <stop offset="100%" stop-color="#111130"/>
    </linearGradient>
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="50%" stop-color="#ddd"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
    <filter id="gf"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="shadow">
      <feDropShadow dx="3" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="glow2">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#F3FF00" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="400" height="560" fill="url(#bg)"/>
  <ellipse cx="200" cy="320" rx="160" ry="150" fill="url(#glow)" filter="url(#gf)"/>

  <!-- Can 1: back left (dark green - Beer) -->
  <g transform="rotate(-10 155 310)" filter="url(#shadow)">
    <ellipse cx="155" cy="220" rx="38" ry="9" fill="url(#top)"/>
    <rect x="120" y="220" width="70" height="175" rx="10" fill="url(#can2)"/>
    <rect x="124" y="224" width="12" height="167" rx="6" fill="white" fill-opacity="0.12"/>
    <ellipse cx="155" cy="395" rx="35" ry="8" fill="#002200"/>
    <!-- Label area -->
    <rect x="122" y="290" width="66" height="65" rx="3" fill="white" fill-opacity="0.08"/>
    <text x="155" y="320" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" fill-opacity="0.7" font-weight="bold">BEER</text>
    <!-- Pull tab -->
    <ellipse cx="155" cy="217" rx="18" ry="5" fill="url(#top)"/>
    <rect x="150" y="208" width="12" height="12" rx="3" fill="#bbb"/>
    <ellipse cx="156" cy="208" rx="6" ry="3" fill="#999" transform="rotate(-15 156 208)"/>
  </g>

  <!-- Can 2: back right (blue - energy) -->
  <g transform="rotate(8 260 300)" filter="url(#shadow)">
    <ellipse cx="260" cy="215" rx="38" ry="9" fill="url(#top)"/>
    <rect x="225" y="215" width="70" height="175" rx="10" fill="url(#can3)"/>
    <rect x="229" y="219" width="12" height="167" rx="6" fill="white" fill-opacity="0.1"/>
    <ellipse cx="260" cy="390" rx="35" ry="8" fill="#0a0a2a"/>
    <!-- Lightning bolt on can -->
    <polygon points="268,265 255,295 263,295 252,320 270,285 261,285" fill="#F3FF00" fill-opacity="0.7"/>
    <ellipse cx="260" cy="212" rx="18" ry="5" fill="url(#top)"/>
    <rect x="255" y="203" width="12" height="12" rx="3" fill="#bbb"/>
  </g>

  <!-- Can 3: CENTER FRONT (red - cola) - biggest, most prominent -->
  <g filter="url(#shadow)">
    <ellipse cx="200" cy="195" rx="46" ry="11" fill="url(#top)"/>
    <rect x="157" y="195" width="86" height="210" rx="12" fill="url(#can1)"/>
    <rect x="163" y="200" width="16" height="200" rx="8" fill="white" fill-opacity="0.15"/>
    <ellipse cx="200" cy="405" rx="43" ry="10" fill="#660000"/>
    <!-- White wave on can -->
    <path d="M160 280 Q185 265 210 280 Q235 295 243 275" stroke="white" stroke-width="2.5" fill="none" stroke-opacity="0.7"/>
    <!-- Label -->
    <rect x="160" y="290" width="80" height="80" rx="5" fill="white" fill-opacity="0.06"/>
    <text x="200" y="330" text-anchor="middle" font-family="serif" font-size="18" fill="white" font-weight="bold" font-style="italic">Cola</text>
    <!-- Top -->
    <ellipse cx="200" cy="190" rx="28" ry="7" fill="url(#top)"/>
    <rect x="192" y="178" width="16" height="15" rx="4" fill="#ccc"/>
    <ellipse cx="200" cy="178" rx="9" ry="4" fill="#bbb" transform="rotate(-10 200 178)"/>
    <!-- Condensation drops -->
    <circle cx="230" cy="250" r="2.5" fill="white" fill-opacity="0.2"/>
    <circle cx="167" cy="320" r="2" fill="white" fill-opacity="0.15"/>
    <circle cx="238" cy="340" r="1.5" fill="white" fill-opacity="0.15"/>
  </g>

  <!-- Ice cubes scattered -->
  <rect x="105" y="430" width="28" height="26" rx="4" fill="#c8f0ff" fill-opacity="0.25" transform="rotate(-15 119 443)"/>
  <rect x="275" y="420" width="24" height="22" rx="4" fill="#c8f0ff" fill-opacity="0.2" transform="rotate(10 287 431)"/>
  <rect x="165" y="440" width="20" height="18" rx="3" fill="#c8f0ff" fill-opacity="0.2" transform="rotate(-5 175 449)"/>

  <!-- Glow floor reflection -->
  <ellipse cx="200" cy="460" rx="120" ry="12" fill="#F3FF00" fill-opacity="0.03"/>

  <!-- Sparkle particles -->
  <circle cx="100" cy="220" r="2.5" fill="white" fill-opacity="0.3"/>
  <circle cx="315" cy="170" r="2" fill="#F3FF00" fill-opacity="0.5"/>
  <circle cx="330" cy="380" r="1.5" fill="white" fill-opacity="0.2"/>
</svg>
