<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0d1a0d"/>
      <stop offset="100%" stop-color="#030703"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pod" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a2a1a"/>
      <stop offset="25%" stop-color="#2a3a2a"/>
      <stop offset="50%" stop-color="#384838"/>
      <stop offset="75%" stop-color="#2a3a2a"/>
      <stop offset="100%" stop-color="#111a11"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00cc66" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#004422" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00cc66" stop-opacity="0.05"/>
      <stop offset="40%" stop-color="#00ff88" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#aaffcc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#004422" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="pod2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a2a"/>
      <stop offset="40%" stop-color="#333355"/>
      <stop offset="60%" stop-color="#444466"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <filter id="gf"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow2">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00ff88" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="560" fill="url(#bg)"/>
  <ellipse cx="200" cy="280" rx="160" ry="160" fill="url(#glow)" filter="url(#gf)"/>

  <!-- POD CARTRIDGE (center, main) - tall transparent pod with green liquid -->
  <g filter="url(#shadow)">
    <!-- Pod outer body -->
    <rect x="158" y="140" width="84" height="250" rx="20" fill="url(#pod)"/>
    <!-- Glass window (transparent section) -->
    <rect x="166" y="175" width="68" height="170" rx="10" fill="url(#glass)" stroke="#00ff88" stroke-width="0.5" stroke-opacity="0.4"/>
    <!-- Liquid inside -->
    <rect x="170" y="215" width="60" height="126" rx="6" fill="url(#liquid)" fill-opacity="0.75"/>
    <!-- Liquid surface -->
    <ellipse cx="200" cy="215" rx="30" ry="4" fill="#00ff88" fill-opacity="0.3"/>
    <!-- Bubble in liquid -->
    <circle cx="188" cy="260" r="4" fill="#00ff88" fill-opacity="0.15" stroke="#00ff88" stroke-width="0.5" stroke-opacity="0.3"/>
    <circle cx="212" cy="300" r="3" fill="#00ff88" fill-opacity="0.1"/>
    <!-- Airflow holes -->
    <ellipse cx="170" cy="370" rx="4" ry="6" fill="#0a0a0a"/>
    <ellipse cx="230" cy="370" rx="4" ry="6" fill="#0a0a0a"/>
    <!-- Mouthpiece top -->
    <rect x="170" y="120" width="60" height="26" rx="12" fill="#2a3a2a"/>
    <rect x="184" y="124" width="32" height="18" rx="8" fill="#1a2a1a"/>
    <!-- Coil indicator -->
    <rect x="174" y="390" width="52" height="8" rx="4" fill="#00ff88" fill-opacity="0.2" filter="url(#glow2)"/>
    <!-- Window highlight -->
    <rect x="170" y="180" width="8" height="160" rx="4" fill="white" fill-opacity="0.08"/>
    <!-- CBD leaf print on pod -->
    <g transform="translate(200,195)" fill="#00cc66" fill-opacity="0.35">
      <ellipse cx="0" cy="-10" rx="5" ry="10" transform="rotate(0)"/>
      <ellipse cx="0" cy="-10" rx="5" ry="10" transform="rotate(60)"/>
      <ellipse cx="0" cy="-10" rx="5" ry="10" transform="rotate(120)"/>
      <ellipse cx="0" cy="-10" rx="5" ry="10" transform="rotate(180)"/>
      <ellipse cx="0" cy="-10" rx="5" ry="10" transform="rotate(240)"/>
      <ellipse cx="0" cy="-10" rx="5" ry="10" transform="rotate(300)"/>
      <line x1="0" y1="-18" x2="0" y2="8" stroke="#00cc66" stroke-width="1.5" stroke-opacity="0.4"/>
    </g>
    <text x="200" y="210" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#00ff88" fill-opacity="0.5" letter-spacing="1">CBD·HARMONY</text>
  </g>

  <!-- Second pod (left, angled) -->
  <g transform="rotate(-12 148 290)" filter="url(#shadow)">
    <rect x="116" y="180" width="64" height="200" rx="16" fill="url(#pod2)"/>
    <rect x="124" y="210" width="48" height="130" rx="8" fill="#7b68ee" fill-opacity="0.25" stroke="#9988ff" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="127" y="280" width="42" height="58" rx="4" fill="#6655cc" fill-opacity="0.4"/>
    <rect x="130" y="168" width="44" height="18" rx="8" fill="#1a1a30"/>
  </g>

  <!-- Bottle of e-liquid (right) -->
  <g transform="rotate(8 285 300)" filter="url(#shadow)">
    <rect x="264" y="240" width="44" height="130" rx="8" fill="#1a3a2a"/>
    <rect x="268" y="248" width="8" height="114" rx="4" fill="#00ff88" fill-opacity="0.08"/>
    <rect x="272" y="220" width="36" height="24" rx="6" fill="#0d2a1a"/>
    <rect x="280" y="205" width="20" height="18" rx="5" fill="#0a220a"/>
    <rect x="284" y="196" width="12" height="12" rx="6" fill="#888"/>
    <!-- Label -->
    <rect x="268" y="268" width="36" height="56" rx="3" fill="#00aa44" fill-opacity="0.15" stroke="#00ff88" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="286" y="292" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#00ff88" fill-opacity="0.6" font-weight="bold">E-LIQUID</text>
    <text x="286" y="305" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#00cc66" fill-opacity="0.5">30ml</text>
    <text x="286" y="316" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#00cc66" fill-opacity="0.5">20mg/ml</text>
  </g>

  <!-- Glow accent: green pool under center pod -->
  <ellipse cx="200" cy="435" rx="60" ry="8" fill="#00ff88" fill-opacity="0.05"/>

  <!-- Particles -->
  <circle cx="130" cy="200" r="2.5" fill="#00ff88" fill-opacity="0.4"/>
  <circle cx="308" cy="180" r="2" fill="#00ff88" fill-opacity="0.5"/>
  <circle cx="320" cy="380" r="1.5" fill="#F3FF00" fill-opacity="0.3"/>
  <circle cx="100" cy="360" r="2" fill="white" fill-opacity="0.2"/>
</svg>
