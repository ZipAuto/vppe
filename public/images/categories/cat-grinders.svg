<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#181210"/>
      <stop offset="100%" stop-color="#050303"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F3FF00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#F3FF00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="25%" stop-color="#d8d8d8"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="75%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="40%" stop-color="#f0f0f0"/>
      <stop offset="70%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <filter id="gf"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="drop">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="glow2">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#F3FF00" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="560" fill="url(#bg)"/>
  <ellipse cx="200" cy="260" rx="150" ry="160" fill="url(#glow)" filter="url(#gf)"/>

  <!-- GRINDER - 3 stacked cylinders -->
  <!-- Bottom: pollen catcher -->
  <ellipse cx="200" cy="430" rx="105" ry="14" fill="#222" filter="url(#drop)"/>
  <rect x="100" y="380" width="200" height="52" rx="16" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
  <!-- bottom highlight -->
  <rect x="104" y="386" width="18" height="40" rx="9" fill="white" fill-opacity="0.06"/>
  <!-- pollen filter mesh pattern -->
  <circle cx="200" cy="406" r="35" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="2 4"/>
  <circle cx="200" cy="406" r="22" fill="none" stroke="#444" stroke-width="0.7" stroke-dasharray="2 3"/>
  <ellipse cx="200" cy="380" rx="100" ry="10" fill="#1a1a1a" stroke="#333" stroke-width="1"/>

  <!-- Middle: grinder chamber -->
  <ellipse cx="200" cy="336" rx="108" ry="14" fill="#444"/>
  <rect x="96" y="248" width="208" height="92" rx="18" fill="url(#metal)" filter="url(#drop)"/>
  <!-- chamber highlight -->
  <rect x="102" y="256" width="20" height="76" rx="10" fill="white" fill-opacity="0.15"/>
  <!-- teeth around edge of chamber - top rim -->
  <ellipse cx="200" cy="248" rx="104" ry="13" fill="#555"/>
  <!-- Teeth pattern (triangular spikes around circumference) -->
  <g fill="#888" transform="translate(200,248)">
    <polygon points="-5,-20 0,-30 5,-20"/>
    <polygon points="14,-16 24,-23 19,-11" transform="rotate(36)"/>
    <polygon points="14,-16 24,-23 19,-11" transform="rotate(72)"/>
    <polygon points="14,-16 24,-23 19,-11" transform="rotate(108)"/>
    <polygon points="14,-16 24,-23 19,-11" transform="rotate(144)"/>
    <polygon points="14,-16 24,-23 19,-11" transform="rotate(180)"/>
    <polygon points="14,-16 24,-23 19,-11" transform="rotate(216)"/>
    <polygon points="14,-16 24,-23 19,-11" transform="rotate(252)"/>
    <polygon points="14,-16 24,-23 19,-11" transform="rotate(288)"/>
    <polygon points="14,-16 24,-23 19,-11" transform="rotate(324)"/>
  </g>

  <!-- Top lid with teeth -->
  <ellipse cx="200" cy="220" rx="108" ry="14" fill="#666"/>
  <rect x="96" y="130" width="208" height="94" rx="18" fill="url(#top)" filter="url(#drop)"/>
  <!-- top lid highlight -->
  <rect x="102" y="138" width="22" height="78" rx="11" fill="white" fill-opacity="0.2"/>
  <!-- teeth on top lid underside -->
  <g fill="#aaa" transform="translate(200,220)">
    <polygon points="-4,18 0,28 4,18"/>
    <polygon points="14,14 22,20 15,8" transform="rotate(40)"/>
    <polygon points="14,14 22,20 15,8" transform="rotate(80)"/>
    <polygon points="14,14 22,20 15,8" transform="rotate(120)"/>
    <polygon points="14,14 22,20 15,8" transform="rotate(160)"/>
    <polygon points="14,14 22,20 15,8" transform="rotate(200)"/>
    <polygon points="14,14 22,20 15,8" transform="rotate(240)"/>
    <polygon points="14,14 22,20 15,8" transform="rotate(280)"/>
    <polygon points="14,14 22,20 15,8" transform="rotate(320)"/>
  </g>
  <!-- Brand imprint on top -->
  <ellipse cx="200" cy="164" rx="50" ry="50" fill="none" stroke="#F3FF00" stroke-width="1.5" stroke-opacity="0.3"/>
  <ellipse cx="200" cy="164" rx="35" ry="35" fill="none" stroke="#F3FF00" stroke-width="0.8" stroke-opacity="0.2"/>
  <!-- V logo mark -->
  <path d="M186 152 L200 180 L214 152" stroke="#F3FF00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.7" fill="none"/>
  <!-- Magnetic clasp indicator -->
  <circle cx="200" cy="222" r="6" fill="#F3FF00" filter="url(#glow2)" fill-opacity="0.9"/>
  <circle cx="200" cy="222" r="3" fill="white"/>

  <!-- Accent particles -->
  <circle cx="310" cy="180" r="3" fill="#F3FF00" fill-opacity="0.5"/>
  <circle cx="95" cy="290" r="2" fill="#F3FF00" fill-opacity="0.4"/>
  <circle cx="320" cy="350" r="2" fill="white" fill-opacity="0.25"/>
</svg>
