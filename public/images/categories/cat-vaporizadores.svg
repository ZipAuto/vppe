<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#040404"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F3FF00" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F3FF00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boxL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="45%" stop-color="#e8e8e8"/>
      <stop offset="55%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001a33"/>
      <stop offset="100%" stop-color="#000d1a"/>
    </linearGradient>
    <filter id="gf"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="drop">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#F3FF00" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="560" fill="url(#bg)"/>
  <ellipse cx="200" cy="260" rx="130" ry="160" fill="url(#glow)" filter="url(#gf)"/>
  <!-- Box mod body -->
  <rect x="120" y="130" width="160" height="280" rx="18" fill="url(#boxL)" filter="url(#drop)"/>
  <!-- Side highlight -->
  <rect x="126" y="138" width="10" height="264" rx="5" fill="white" fill-opacity="0.25"/>
  <!-- Top edge -->
  <rect x="120" y="130" width="160" height="12" rx="6" fill="white" fill-opacity="0.1"/>
  <!-- Screen area -->
  <rect x="143" y="155" width="114" height="80" rx="6" fill="url(#screen)"/>
  <rect x="145" y="157" width="110" height="76" rx="5" fill="#001428" stroke="#F3FF00" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Screen content: wattage display -->
  <text x="200" y="192" text-anchor="middle" font-family="monospace" font-size="26" font-weight="bold" fill="#F3FF00" fill-opacity="0.95">85W</text>
  <text x="200" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#4af" fill-opacity="0.8">TEMP · WATT · TC</text>
  <rect x="155" y="218" width="90" height="3" rx="1.5" fill="#F3FF00" fill-opacity="0.15"/>
  <!-- Fire button -->
  <rect x="246" y="165" width="28" height="56" rx="8" fill="#F3FF00" filter="url(#drop)"/>
  <rect x="251" y="172" width="18" height="42" rx="5" fill="white" fill-opacity="0.2"/>
  <!-- Up/down buttons -->
  <rect x="127" y="170" width="24" height="22" rx="5" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <text x="139" y="185" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#F3FF00">+</text>
  <rect x="127" y="198" width="24" height="22" rx="5" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <text x="139" y="213" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#F3FF00">−</text>
  <!-- Battery indicator -->
  <rect x="147" y="248" width="106" height="16" rx="3" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="149" y="250" width="78" height="12" rx="2" fill="#F3FF00" fill-opacity="0.7"/>
  <text x="260" y="261" text-anchor="middle" font-family="monospace" font-size="9" fill="#888">74%</text>
  <!-- USB port -->
  <rect x="172" y="388" width="56" height="10" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="184" y="390" width="32" height="6" rx="3" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <!-- Connection threads at top -->
  <rect x="172" y="120" width="56" height="14" rx="4" fill="#888" stroke="#555" stroke-width="1"/>
  <rect x="176" y="122" width="6" height="10" rx="1" fill="#aaa"/>
  <rect x="187" y="122" width="6" height="10" rx="1" fill="#aaa"/>
  <rect x="198" y="122" width="6" height="10" rx="1" fill="#aaa"/>
  <rect x="209" y="122" width="6" height="10" rx="1" fill="#aaa"/>
  <rect x="220" y="122" width="6" height="10" rx="1" fill="#aaa"/>
  <!-- Tank/atomizer on top -->
  <rect x="165" y="70" width="70" height="55" rx="12" fill="#d0d0d0" stroke="#bbb" stroke-width="1"/>
  <rect x="175" y="42" width="50" height="32" rx="8" fill="#c8c8c8"/>
  <rect x="185" y="32" width="30" height="14" rx="4" fill="#b0b0b0"/>
  <ellipse cx="200" cy="32" rx="12" ry="5" fill="#888"/>
  <!-- Glow particles -->
  <circle cx="310" cy="150" r="3" fill="#F3FF00" fill-opacity="0.5"/>
  <circle cx="95" cy="320" r="2" fill="#F3FF00" fill-opacity="0.4"/>
  <circle cx="320" cy="380" r="1.5" fill="white" fill-opacity="0.3"/>
</svg>
